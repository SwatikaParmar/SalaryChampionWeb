<div class="bank-verify-wrapper">
  <div class="row align-items-center">

    <!-- LEFT -->
    <div class="col-md-6">
      <div class="bank-verify-card shadow-sm p-4 rounded-3">

        <!-- ICON -->
        <div class="text-center mb-3">
          <img src="assets/images/bank-verification.svg" width="120" />
        </div>

        <!-- ================= MESSAGE ================= -->
        <p class="text-center fw-semibold">

          <!-- BEFORE START -->
          <ng-container *ngIf="!consentId && !aaLoading">
            Securely fetch your bank statement using Account Aggregator.
          </ng-container>

          <!-- LOADING BEFORE CONSENT -->
          <ng-container *ngIf="!consentId && aaLoading">
            Creating consent...
          </ng-container>

          <!-- AFTER CONSENT -->
          <ng-container *ngIf="consentId">
            {{ journeyMessage || 'Processing your bank data...' }}
          </ng-container>

        </p>

        <!-- ================= BUTTON ================= -->
        <button
          *ngIf="!consentId"
          class="btn btn-primary w-100 mt-3"
          (click)="startAAFlow()"
          [disabled]="aaLoading">

          <span *ngIf="!aaLoading">Fetch Bank Statement</span>
          <span *ngIf="aaLoading">
            <span class="spinner-border spinner-border-sm me-2"></span>
            Processing...
          </span>

        </button>

        <!-- ================= LOADER ================= -->
        <div *ngIf="consentId" class="text-center mt-4">

          <div class="spinner-border text-primary"></div>

          <p class="mt-2 small text-muted">
            Please don’t refresh or close this page
          </p>

        </div>

      </div>
    </div>

    <!-- RIGHT -->
    <div class="col-md-6 text-center">
      <img src="assets/images/bank_verification_vector.webp" class="img-fluid"/>
    </div>

  </div>
</div>
