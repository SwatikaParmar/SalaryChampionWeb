<div class="bank-container">

  <!-- HEADER -->
  <div class="action-arr mb-3">

    <!-- LEFT -->
    <div class="d-flex align-items-center gap-2">
      <button type="button" class="back-lk" (click)="goToLoanHome()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h2 class="page-title m-0">Fetch Bank Statement</h2>
    </div>

    <!-- RIGHT SKIP -->
    <button class="skip-btn-header" (click)="skipProcess()">
      Skip
    </button>

  </div>

  <!-- CARD -->
  <div class="bank-card">

    <p class="subtitle">
      Securely share your bank statement using OneMoney consent flow.
      No passwords. No manual uploads.
    </p>

    <!-- Steps -->
    <div class="steps">
      <div class="step">
        <span class="step-icon">1</span>
        <p>Verify mobile number</p>
      </div>

      <div class="step-line"></div>

      <div class="step">
        <span class="step-icon">2</span>
        <p>Select your bank</p>
      </div>

      <div class="step-line"></div>

      <div class="step">
        <span class="step-icon">3</span>
        <p>Approve consent</p>
      </div>
    </div>

    <!-- CTA -->
    <button class="primary-btn" (click)="fetchBankStatement()">
      Fetch Bank Statement
    </button>

    <p class="secure-text">
      🔒 Powered by OneMoney • RBI approved
    </p>

  </div>
</div>
