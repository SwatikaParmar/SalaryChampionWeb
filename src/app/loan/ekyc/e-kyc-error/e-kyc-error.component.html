<div class="ekyc-container">
  <div class="row ekyc-row">
    <div class="col-md-6 ekyc-panel">
      <div class="ekyc-card error-card">
        <!-- Title -->
        <h2 class="ekyc-title">
          e-KYC Verification Failed
        </h2>

        <!-- Illustration -->
        <div class="ekyc-illustration">
          <img src="assets/images/remove.png" alt="eKYC Failed" class="img-fluid" />
        </div>

        <!-- Message -->
        <p class="ekyc-text" *ngIf="reason">{{ reason }}</p>

        <!-- Actions -->
        <div class="action-buttons">
          <button class="btn-outline" (click)="goBack()">
            Go Back
          </button>

          <button class="btn-primary" (click)="retry()">
            Retry e-KYC
          </button>
        </div>
      </div>
    </div>

    <div class="col-md-6 ekyc-panel">
      <div class="ekyc-card visual-card">
        <img
          src="assets/images/e_kyc_verification_failed.webp"
          alt="eKYC Failed"
          class="visual-image" />
      </div>
    </div>
  </div>
</div>
