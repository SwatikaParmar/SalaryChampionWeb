<div class="personal-info-container">

  <div class="action-arr">
    <a [routerLink]="['/dashboard/profile']" class="back-lk"><i class="fa-solid fa-arrow-left"></i></a>
    <h2 class="page-title">Basic Detail</h2>
  </div>

  <div class="personal-info-card mt-3">
    <div class="personal-info-form">      
      <p class="subtitle">A bit about yourself</p>
      <hr class="mt-3">

<form [formGroup]="basicForm" (ngSubmit)="submit()">

<!-- Employment -->
<div class="form-group">
<label>Select Employment Type *</label>

<div class="radio-row">

<label>
<input type="radio" value="SALARIED" formControlName="employmentType">
Salaried
</label>

<label>
<input type="radio" value="SELF_EMPLOYED" formControlName="employmentType">
Self Employed
</label>

</div>

</div>

<!-- Salary Mode -->

<div class="form-group">
<label>Mode Of Salary Received *</label>

<div class="radio-row">

<label>
<input type="radio" value="BANK" formControlName="modeOfSalaryReceived">
Bank
</label>

<label>
<input type="radio" value="CASH" formControlName="modeOfSalaryReceived">
Cash
</label>

</div>
</div>

<!-- Residence -->

<div class="form-group">
<label>Residence Type *</label>

<div class="radio-row">

<label>
<input type="radio" value="OWNED" formControlName="residenceType">
Owned
</label>

<label>
<input type="radio" value="RENTED" formControlName="residenceType">
Rented
</label>

</div>

</div>

<!-- DOB -->

<div class="form-group">

<label>Date Of Birth *</label>

<input type="date" formControlName="dob">

</div>

<!-- Gender -->

<div class="form-group">

<label>Select Gender *</label>

<div class="radio-row">

<label>
<input type="radio" value="MALE" formControlName="gender">
Male
</label>

<label>
<input type="radio" value="FEMALE" formControlName="gender">
Female
</label>

</div>

</div>

<!-- Pincode -->

<div class="form-group">

<label>Pincode *</label>

<input type="text"
maxlength="6"
formControlName="pincode"
placeholder="Enter Pincode">

<small class="error"
*ngIf="basicForm.get('pincode')?.touched && basicForm.get('pincode')?.errors?.['required']">
Pincode is required
</small>

<small class="error"
*ngIf="basicForm.get('pincode')?.touched && basicForm.get('pincode')?.errors?.['pattern']">
Enter valid 6 digit pincode
</small>



</div>


<!-- Personal Email -->

<div class="form-group">

<label>Personal Mail Id *</label>

<input type="email"
formControlName="personalEmail"
placeholder="Enter Personal Mail ID">

<small class="error"
*ngIf="basicForm.get('personalEmail')?.touched && basicForm.get('personalEmail')?.errors?.['required']">
Personal email is required
</small>

<small class="error"
*ngIf="basicForm.get('personalEmail')?.touched && basicForm.get('personalEmail')?.errors?.['pattern']">
Enter valid email address
</small>

</div>

<!-- Official Email -->

<div class="form-group">

<label>Official Mail Id </label>

<input type="email"
formControlName="officialEmail"
placeholder="Enter Official Mail ID">

<small class="error"
*ngIf="basicForm.get('officialEmail')?.touched && basicForm.get('officialEmail')?.errors?.['required']">
Official email is required
</small>

<small class="error"
*ngIf="basicForm.get('officialEmail')?.touched && basicForm.get('officialEmail')?.errors?.['pattern']">
Enter valid official email
</small>


</div>

<button class="btn-primary theme-btn">
CHECK ELIGIBILITY
</button>

</form>
    </div>

    <div class="personal-info-illustration1" style="background: url(../assets/images/personal_information.png)no-repeat center; background-size: cover;">
      <img src="assets/images/personal_information.png" class="img-fluid if-dnone">
    </div>

  </div>
</div>
